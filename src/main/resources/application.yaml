spring:
  application:
    name: sparta-msa-project-part-2

  datasource:
    url: jdbc:postgresql://localhost:5432/sparta_msa_part2
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      chat:
        base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        options:
          model:  "gemini-2.5-flash-lite"
          temperature: 0.1
          max-tokens: 4096
        completions-path: "/chat/completions"
logging:
  level:
    org.hibernate.SQL: DEBUG

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true