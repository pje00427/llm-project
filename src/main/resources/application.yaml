spring:
  application:
    name: sparta-msa-project-part-3
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sparta_msa_part2}
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379

  session:
    store-type: redis

  cache:
    type: redis

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    openai:
      api-key: ${GEMINI_API_KEY}
      chat:
        base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        options:
          model: "gemini-2.5-flash-lite"
          temperature: 0.1
          max-tokens: 4096
        completions-path: "/chat/completions"
      embedding:
        base-url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        api-key: ${GEMINI_API_KEY}
        options:
          model: "gemini-embedding-001"
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 3072
        distance-type: COSINE_DISTANCE
        index-type: hnsw

logging:
  level:
    org.hibernate.SQL: DEBUG

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true

external:
  shop:
    url: http://localhost:3001