spring:
  application:
    name: sparta-msa-project-part-2

  datasource:
    url: jdbc:postgresql://localhost:5432/sparta_msa_part2
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.hibernate.SQL: DEBUG

server:
  port: 8080

springdoc:
  swagger-ui:
    enabled: true